name: Build and push edge images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  CONTROLLER_IMAGE: ghcr.io/${{ github.repository }}/controller
  ENGINE_CLAUDE_CODE_IMAGE: ghcr.io/${{ github.repository }}/engine-claude-code
  ENGINE_CODEX_IMAGE: ghcr.io/${{ github.repository }}/engine-codex
  ENGINE_OPENCODE_IMAGE: ghcr.io/${{ github.repository }}/engine-opencode
  ENGINE_CLINE_IMAGE: ghcr.io/${{ github.repository }}/engine-cline

jobs:
  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CONTROLLER_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/controller/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  engine-claude-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_CLAUDE_CODE_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: docker/engine-claude-code
          file: docker/engine-claude-code/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  engine-codex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_CODEX_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: docker/engine-codex
          file: docker/engine-codex/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  engine-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ENGINE_OPENCODE_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: docker/engine-opencode
          file: docker/engine-opencode/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # engine-cline omitted: Cline is a VS Code extension with no headless
  # CLI mode. The Dockerfile in docker/engine-cline/ is a community
  # contribution template; it cannot produce a working image until a
  # proper headless integration is implemented.

  helm-chart-dev:
    runs-on: ubuntu-latest
    needs:
      - controller
      - engine-claude-code
      - engine-codex
      - engine-opencode
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package dev chart
        run: |
          helm package charts/osmia \
            --version 0.0.0-edge \
            --app-version "${{ github.sha }}" \
            --destination gh-pages/

      - name: Update repo index
        run: |
          helm repo index gh-pages/ \
            --merge gh-pages/index.yaml \
            --url https://unitaryai.github.io/osmia

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add osmia-0.0.0-edge.tgz index.yaml
          git commit -m "chore: publish 0.0.0-edge chart (${GITHUB_SHA:0:7})" || echo "Nothing to commit"
          git push
