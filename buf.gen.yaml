version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/unitaryai/robodev/proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: proto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: proto
    opt:
      - paths=source_relative
  # Python stubs (generated via buf generate)
  - remote: buf.build/protocolbuffers/python
    out: sdk/python/src/robodev/proto
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/python
    out: sdk/python/src/robodev/proto
    opt:
      - paths=source_relative
  # TypeScript stubs using protobuf-es (generated via buf generate)
  - remote: buf.build/bufbuild/es
    out: sdk/typescript/src/proto
    opt:
      - target=ts
      - paths=source_relative
