apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "osmia.fullname" . }}
  labels:
    {{- include "osmia.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.deploymentStrategy }}
  selector:
    matchLabels:
      {{- include "osmia.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "osmia.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "osmia.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.plugins }}
      initContainers:
        {{- range .Values.plugins }}
        - name: plugin-{{ .name }}
          image: {{ .image }}
          command: ["cp", {{ .binaryPath | quote }}, "/plugins/osmia-plugin-{{ .name }}"]
          volumeMounts:
            - name: plugins
              mountPath: /plugins
        {{- end }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/osmia/config.yaml
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/osmia
              readOnly: true
            {{- if .Values.plugins }}
            - name: plugins
              mountPath: /opt/osmia/plugins
              readOnly: true
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if and .Values.sessionPersistence.enabled (eq .Values.sessionPersistence.backend "shared-pvc") }}
            - name: session-pvc
              mountPath: /data/sessions
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "osmia.fullname" . }}-config
        {{- if .Values.plugins }}
        - name: plugins
          emptyDir: {}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "osmia.fullname" . }}-data
        {{- end }}
        {{- if and .Values.sessionPersistence.enabled (eq .Values.sessionPersistence.backend "shared-pvc") }}
        - name: session-pvc
          persistentVolumeClaim:
            claimName: {{ .Values.sessionPersistence.sharedPVC.name }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
