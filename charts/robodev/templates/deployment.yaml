apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "robodev.fullname" . }}
  labels:
    {{- include "robodev.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "robodev.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "robodev.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "robodev.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.plugins }}
      initContainers:
        {{- range .Values.plugins }}
        - name: plugin-{{ .name }}
          image: {{ .image }}
          command: ["cp", {{ .binaryPath | quote }}, "/plugins/robodev-plugin-{{ .name }}"]
          volumeMounts:
            - name: plugins
              mountPath: /plugins
        {{- end }}
      {{- end }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config=/etc/robodev/config.yaml
            - --metrics-addr=:{{ .Values.metrics.port }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/robodev
              readOnly: true
            {{- if .Values.plugins }}
            - name: plugins
              mountPath: /opt/robodev/plugins
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "robodev.fullname" . }}-config
        {{- if .Values.plugins }}
        - name: plugins
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
