# Default values for robodev.

replicaCount: 1

image:
  repository: ghcr.io/unitaryai/robodev/controller
  pullPolicy: IfNotPresent
  tag: ""  # Overrides the chart appVersion

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

# Controller configuration — mounted as a ConfigMap.
config:
  ticketing:
    backend: github
  secrets:
    backend: k8s
  engines:
    default: claude-code
  guardrails:
    max_cost_per_job: 50.0
    max_concurrent_jobs: 5
    max_job_duration_minutes: 120

metrics:
  enabled: true
  port: 8080
  serviceMonitor:
    enabled: false
    interval: 30s
    labels: {}

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

# Leader election for high-availability deployments.
leaderElection:
  enabled: true

# External plugin init containers.
# Each entry creates an init container that copies a plugin binary into
# a shared emptyDir volume mounted at /opt/robodev/plugins.
#
# Example:
#   plugins:
#     - name: jira
#       image: ghcr.io/myorg/robodev-plugin-jira:v1.2.0
#       binaryPath: /plugin
#     - name: pagerduty
#       image: ghcr.io/myorg/robodev-plugin-pagerduty:v0.3.1
#       binaryPath: /plugin
plugins: []

# Webhook receiver — when enabled, the controller accepts webhook events
# in addition to (or instead of) polling the ticketing backend.
webhook:
  enabled: false
  port: 8081
  service:
    type: ClusterIP
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    #  - host: webhooks.example.com
    #    paths:
    #      - path: /
    #        pathType: Prefix
    tls: []
    #  - secretName: webhooks-tls
    #    hosts:
    #      - webhooks.example.com

# Sandbox — gVisor-based agent isolation with optional warm pools.
sandbox:
  enabled: false
  runtimeClass: gvisor
  warmPool:
    enabled: false
    size: 3
  envStripping: true

# NetworkPolicy — restrict ingress/egress for controller and agent pods.
networkPolicy:
  enabled: false
  agent: {}
    # extraEgressRules: []
  controller: {}
    # webhookSourceCIDR: ""
    # metricsSourceSelector: {}
    # kubeAPIServerCIDR: "0.0.0.0/0"
    # extraIngressRules: []
    # extraEgressRules: []

# PodDisruptionBudget for the controller deployment.
pdb:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: ""

# Persistence — mounts a PVC at /data for SQLite stores (memory, routing, watchdog).
# Disabled by default; enable when using memory, routing, or estimator subsystems.
persistence:
  enabled: false
  size: 1Gi
  storageClass: ""  # leave empty to use cluster default
  accessMode: ReadWriteOnce

service:
  type: ClusterIP

nodeSelector: {}
tolerations: []
affinity: {}
