# docker-compose.yaml — Local development environment for Osmia.
#
# Runs the controller outside of Kubernetes using the "local" execution
# backend. Engine containers are launched dynamically by the controller
# and are not defined here.
#
# Usage:
#   make compose-up     # start the controller
#   make compose-down   # stop and remove containers

services:
  controller:
    build:
      context: .
      dockerfile: docker/controller/Dockerfile
    ports:
      - "8080:8080"   # metrics and health
      - "8081:8081"   # webhook receiver
    environment:
      - OSMIA_CONFIG=/config/osmia-config.yaml
    volumes:
      - ./osmia-config.yaml:/config/osmia-config.yaml:ro
      - osmia-workspace:/workspace

volumes:
  osmia-workspace:
