# ExternalSecret example for teams using External Secrets Operator (ESO)
# instead of the native AWS Secrets Manager backend.
#
# Prerequisites:
#   1. External Secrets Operator installed on the cluster
#   2. A ClusterSecretStore configured for AWS Secrets Manager (see below)
#   3. Secrets created in AWS Secrets Manager under the osmia/ prefix
#
# With ESO, secrets are synced into Kubernetes Secrets automatically.
# Osmia's built-in k8s backend reads them with no code changes.

---
# ClusterSecretStore — authenticates to AWS Secrets Manager via IRSA.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-west-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

---
# ExternalSecret — syncs the Anthropic API key from AWS Secrets Manager
# into a Kubernetes Secret that Osmia can read.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: osmia-anthropic
  namespace: osmia-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: osmia-anthropic
  data:
    - secretKey: api_key
      remoteRef:
        key: osmia/anthropic-api-key
        property: api_key

---
# ExternalSecret — syncs the GitHub token.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: osmia-github-token
  namespace: osmia-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: osmia-github-token
  data:
    - secretKey: token
      remoteRef:
        key: osmia/github-token
        property: token
