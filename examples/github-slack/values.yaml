# Minimal Osmia deployment: GitHub Issues + Slack notifications.
# This is the quickest way to get started with Osmia.

replicaCount: 1

image:
  repository: ghcr.io/unitaryai/osmia
  pullPolicy: IfNotPresent
  tag: "latest"

config:
  ticketing:
    backend: github
    config:
      owner: "your-org"
      repo: "your-repo"
      labels:
        - "osmia"
      # Optional filters (combine as needed):
      # assignee: "osmia-bot"
      # milestone: "1"              # Must be milestone number, not title
      # state: "open"               # "open" (default), "closed", or "all"
      # exclude_labels:             # Overrides default exclusion of in-progress/failed
      #   - "in-progress"
      #   - "osmia-failed"
      #   - "wontfix"
      token_secret: "osmia-github-token"

  notifications:
    channels:
      - backend: slack
        config:
          channel_id: "C0123456789"
          token_secret: "osmia-slack-token"

  secrets:
    backend: k8s

  engines:
    default: claude-code

  guardrails:
    max_cost_per_job: 50.0
    max_concurrent_jobs: 3
    max_job_duration_minutes: 120
    blocked_file_patterns:
      - "*.env"
      - "**/secrets/**"
      - "**/credentials/**"

  scm:
    backend: github
    config:
      token_secret: "osmia-github-token"

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
