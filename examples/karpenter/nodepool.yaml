# Karpenter NodePool for Osmia agent workloads.
# This provisions dedicated compute nodes for AI coding agent jobs,
# using spot instances for cost efficiency and taints for isolation.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: osmia
spec:
  disruption:
    consolidateAfter: 2m
    consolidationPolicy: WhenEmpty
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - c6i.xlarge     # 4 vCPU, 8 GiB
            - c6i.2xlarge    # 8 vCPU, 16 GiB
            - c7i.xlarge     # 4 vCPU, 8 GiB
            - c7i.2xlarge    # 8 vCPU, 16 GiB
            - m6i.xlarge     # 4 vCPU, 16 GiB (if memory needed)
      taints:
        - effect: NoSchedule
          key: osmia.io/agent
          value: "true"
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: osmia
  limits:
    cpu: "64"            # Maximum 64 vCPU across all Osmia nodes
    memory: "128Gi"
---
# EC2NodeClass for Osmia nodes (AWS-specific).
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: osmia
spec:
  amiSelectorTerms:
    - alias: "al2023@latest"
  role: "KarpenterNodeRole-${CLUSTER_NAME}"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  tags:
    osmia.io/managed: "true"
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        deleteOnTermination: true
