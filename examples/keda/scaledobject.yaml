# KEDA ScaledObject for scaling based on ticket queue depth.
# This example uses the Prometheus scaler to monitor the number of
# queued tickets and scale the controller accordingly.
#
# Prerequisites:
# - KEDA installed in the cluster
# - Prometheus collecting Osmia metrics
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: osmia-ticket-scaler
  namespace: osmia
spec:
  scaleTargetRef:
    name: osmia-controller
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 1  # Controller uses leader election; only 1 active
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-server.monitoring.svc.cluster.local
        metricName: osmia_active_jobs
        query: osmia_active_jobs
        threshold: "10"
---
# TriggerAuthentication for Prometheus (if authentication is required).
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: osmia-prometheus-auth
  namespace: osmia
spec:
  secretTargetRef: []
