// Package secrets defines the SecretsBackend plugin interface.
// Secrets backends abstract over different secret storage systems
// (Kubernetes Secrets, HashiCorp Vault, AWS Secrets Manager, 1Password,
// External Secrets Operator) to provide a uniform way of injecting
// credentials into agent execution containers.

syntax = "proto3";

package robodev.v1;

option go_package = "github.com/unitaryai/robodev/proto/v1;v1";

import "common.proto";

// SecretsBackend is the interface that all secrets plugins must implement.
// The controller uses this to resolve secret references in engine
// configurations and inject them as environment variables into K8s Jobs.
// Built-in backends (K8s Secrets) are compiled into the controller binary;
// external backends (Vault, AWS SM) run as gRPC subprocesses.
service SecretsBackend {
  // Handshake performs version negotiation between the controller and plugin.
  rpc Handshake(HandshakeRequest) returns (HandshakeResponse);

  // GetSecret retrieves a single secret value by key. The key format is
  // backend-specific (e.g. "namespace/secret-name/key" for K8s,
  // "secret/data/path#field" for Vault).
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);

  // GetSecrets retrieves multiple secret values in a single call. This is
  // more efficient than calling GetSecret repeatedly when multiple secrets
  // are needed (e.g. building the full env var set for a job).
  rpc GetSecrets(GetSecretsRequest) returns (GetSecretsResponse);

  // BuildEnvVars translates secret references from the engine configuration
  // into Kubernetes-native EnvVar specifications. This allows backends to
  // use native K8s secret references (secretKeyRef) where possible, avoiding
  // the need to fetch and inject secret values directly.
  rpc BuildEnvVars(BuildEnvVarsRequest) returns (BuildEnvVarsResponse);
}

// GetSecretRequest identifies a single secret to retrieve.
message GetSecretRequest {
  // key is the backend-specific secret reference.
  string key = 1;
}

// GetSecretResponse contains the resolved secret value.
message GetSecretResponse {
  // value is the secret value. Callers must handle this securely and
  // never log it.
  string value = 1;
}

// GetSecretsRequest identifies multiple secrets to retrieve.
message GetSecretsRequest {
  // keys is the list of backend-specific secret references.
  repeated string keys = 1;
}

// GetSecretsResponse contains the resolved secret values keyed by the
// requested keys.
message GetSecretsResponse {
  // secrets maps each requested key to its resolved value.
  map<string, string> secrets = 1;
}

// SecretRef maps an environment variable name to a backend-specific
// secret reference.
message SecretRef {
  // env_name is the environment variable name to set in the container.
  string env_name = 1;

  // secret_key is the backend-specific reference to the secret value.
  string secret_key = 2;
}

// BuildEnvVarsRequest carries the secret references from the engine
// configuration that need to be translated into K8s EnvVars.
message BuildEnvVarsRequest {
  // secret_refs maps environment variable names to backend-specific
  // secret references.
  repeated SecretRef secret_refs = 1;
}

// EnvVar represents a Kubernetes-native environment variable specification.
// It supports both direct values and secret references.
message EnvVar {
  // name is the environment variable name.
  string name = 1;

  // value is the direct value, if the backend resolves secrets inline.
  // Mutually exclusive with secret_ref.
  string value = 2;

  // secret_ref is a Kubernetes secretKeyRef, if the backend supports
  // native K8s secret references. Mutually exclusive with value.
  SecretKeyRef secret_ref = 3;
}

// SecretKeyRef references a key within a Kubernetes Secret object.
message SecretKeyRef {
  // name is the name of the Kubernetes Secret.
  string name = 1;

  // key is the key within the Secret's data map.
  string key = 2;
}

// BuildEnvVarsResponse contains the translated environment variable
// specifications ready for injection into a K8s Pod spec.
message BuildEnvVarsResponse {
  // env_vars is the list of environment variable specifications.
  repeated EnvVar env_vars = 1;
}
